<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Calculator</h1>
            </div>
            
            <div class="display">
                <input 
                    type="text" 
                    id="display" 
                    class="display-input" 
                    placeholder="0" 
                    readonly
                >
            </div>
            
            <div class="buttons-grid">
                <!-- Row 1 -->
                <button class="btn btn-function" onclick="clearDisplay()">AC</button>
                <button class="btn btn-function" onclick="deleteLast()">DEL</button>
                <button class="btn btn-function" onclick="appendToDisplay('/')">&div;</button>
                <button class="btn btn-function" onclick="appendToDisplay('*')">&times;</button>
                
                <!-- Row 2 -->
                <button class="btn" onclick="appendToDisplay('7')">7</button>
                <button class="btn" onclick="appendToDisplay('8')">8</button>
                <button class="btn" onclick="appendToDisplay('9')">9</button>
                <button class="btn btn-function" onclick="appendToDisplay('-')">−</button>
                
                <!-- Row 3 -->
                <button class="btn" onclick="appendToDisplay('4')">4</button>
                <button class="btn" onclick="appendToDisplay('5')">5</button>
                <button class="btn" onclick="appendToDisplay('6')">6</button>
                <button class="btn btn-function" onclick="appendToDisplay('+')">+</button>
                
                <!-- Row 4 -->
                <button class="btn" onclick="appendToDisplay('1')">1</button>
                <button class="btn" onclick="appendToDisplay('2')">2</button>
                <button class="btn" onclick="appendToDisplay('3')">3</button>
                <button class="btn btn-function" onclick="appendToDisplay('.')">.</button>
                
                <!-- Row 5 -->
                <button class="btn btn-zero" onclick="appendToDisplay('0')">0</button>
                <button class="btn btn-function" onclick="appendToDisplay('(')">( )</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
            
            <div class="functions">
                <h3>Functions</h3>
                <div class="function-buttons">
                    <button class="btn btn-small" onclick="appendToDisplay('sqrt(')">√</button>
                    <button class="btn btn-small" onclick="appendToDisplay('sin(')">sin</button>
                    <button class="btn btn-small" onclick="appendToDisplay('cos(')">cos</button>
                    <button class="btn btn-small" onclick="appendToDisplay('tan(')">tan</button>
                    <button class="btn btn-small" onclick="appendToDisplay('pi')">π</button>
                    <button class="btn btn-small" onclick="appendToDisplay('e')">e</button>
                </div>
            </div>
            
            <div class="result-display" id="resultDisplay"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
